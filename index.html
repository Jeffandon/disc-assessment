<title>Avaliação DISC</title>

  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:'Inter',sans-serif;padding:24px 16px;}
  .wrap{max-width:680px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .card{background:#fff;border-radius:20px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden;}
  .header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:28px 32px;text-align:center;}
  .header h1{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px;}
  .header p{font-size:13px;opacity:.7;line-height:1.6;}
  .tag{display:inline-block;background:rgba(255,255,255,.1);border-radius:20px;padding:5px 16px;font-size:11px;letter-spacing:3px;margin-bottom:14px;color:rgba(255,255,255,.7);}
  .body{padding:28px 32px;}
  .disc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
  .disc-chip{text-align:center;padding:12px 6px;border-radius:12px;}
  .disc-chip .letter{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;}
  .disc-chip .lbl{font-size:11px;color:#666;margin-top:3px;}
  label{font-size:14px;font-weight:700;color:#222;display:block;margin-bottom:8px;}
  input[type=text],input[type=email],input[type=password]{width:100%;padding:12px 14px;border-radius:10px;border:2px solid #e0e0e0;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border .2s;margin-bottom:18px;}
  input:focus{border-color:#0f3460;}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;font-family:'Inter',sans-serif;transition:opacity .2s;}
  .btn-primary{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;}
  .btn-green{background:linear-gradient(135deg,#1E8449,#27AE60);color:#fff;}
  .btn-ghost{background:transparent;color:#666;border:2px solid #e0e0e0;margin-top:10px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .error-box{background:#fdf2f0;border:1px solid #f1948a;border-radius:8px;padding:10px 14px;color:#c0392b;font-size:13px;margin-bottom:16px;}
  .note{font-size:11px;color:#aaa;text-align:center;margin-top:12px;}

  /* Progress */
  .prog-bar{height:5px;background:#f0f0f0;}
  .prog-fill{height:100%;background:linear-gradient(90deg,#1a1a2e,#27AE60);border-radius:0 4px 4px 0;transition:width .3s;}
  .prog-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;}
  .prog-header h2{font-family:'Playfair Display',serif;font-size:18px;color:#1a1a2e;}
  .prog-count{font-size:22px;font-weight:800;color:#1a1a2e;text-align:right;}
  .prog-count span{font-size:13px;font-weight:400;color:#999;}

  /* Questions */
  .question{margin-bottom:22px;padding:18px;border-radius:14px;border:2px solid #f0f0f0;background:#fafafa;transition:all .2s;}
  .question.answered{border-color:#c8e6c9;background:#f8fff8;}
  .q-num{font-size:11px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:6px;}
  .q-text{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:14px;line-height:1.5;}
  .opt-btn{width:100%;text-align:left;padding:11px 14px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;font-size:14px;color:#444;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:10px;margin-bottom:7px;transition:all .15s;}
  .opt-btn:hover{border-color:#bbb;background:#f5f5f5;}
  .opt-btn.sel{font-weight:700;}
  .radio{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .radio-dot{width:8px;height:8px;border-radius:50%;background:#fff;}

  /* Result */
  .result-card{border-radius:16px;overflow:hidden;border:2px solid;box-shadow:0 4px 20px rgba(0,0,0,.08);}
  .result-header{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border-bottom:2px solid;}
  .result-badge{border-radius:12px;padding:8px 20px;font-weight:800;font-size:17px;letter-spacing:2px;font-family:'Playfair Display',serif;color:#fff;}
  .result-body{padding:24px;display:flex;flex-wrap:wrap;gap:24px;}
  .radar-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;}
  .legend{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
  .leg-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#555;}
  .leg-dot{width:10px;height:10px;border-radius:2px;}
  .info-cols{flex:1 1 260px;}
  .italic-block{font-size:14px;color:#333;line-height:1.7;margin-bottom:16px;font-style:italic;border-left:3px solid;padding-left:12px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .mini-card{border-radius:10px;padding:12px;border:1px solid;}
  .mini-title{font-weight:700;font-size:13px;margin-bottom:6px;}
  .mini-item{font-size:12px;color:#333;margin-bottom:4px;}
  .analyst-box{border-radius:10px;padding:12px;border:1px solid;}
  .analyst-title{font-weight:700;font-size:13px;margin-bottom:6px;}
  .analyst-text{font-size:13px;color:#333;line-height:1.6;}
  .bars{padding:0 24px 24px;}
  .bar-row{margin-bottom:8px;}
  .bar-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px;}
  .bar-track{height:10px;background:#f0f0f0;border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;transition:width 1s ease;}

  /* Admin */
  .admin-link{margin-top:16px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;}
  .success-note{background:#f8f9fa;border-radius:12px;padding:16px;font-size:13px;color:#666;line-height:1.6;text-align:center;}
  /* ── ADMIN DASHBOARD ── */
  .adm{min-height:100vh;background:linear-gradient(135deg,#0a0a1a,#111128,#0d0d22);font-family:'Inter',sans-serif;padding:0;}
  .adm-topbar{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);padding:16px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);}
  .adm-logo{font-family:'Playfair Display',serif;font-size:20px;color:#fff;display:flex;align-items:center;gap:10px;}
  .adm-logo span{background:linear-gradient(135deg,#6c63ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .adm-topbar-right{display:flex;gap:8px;align-items:center;}
  .adm-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
  .adm-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
  .adm-btn-accent{background:linear-gradient(135deg,#6c63ff,#4834d4);border-color:transparent;color:#fff;}
  .adm-content{padding:28px;}
  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
  .kpi-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border .2s;}
  .kpi-card:hover{border-color:rgba(255,255,255,.18);}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,#6c63ff);}
  .kpi-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .kpi-value{font-size:30px;font-weight:800;color:#fff;font-family:'Playfair Display',serif;line-height:1;}
  .kpi-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:5px;}
  .kpi-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:26px;opacity:.18;}
  /* Charts row */
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
  @media(max-width:700px){.charts-row{grid-template-columns:1fr;}}
  .chart-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;}
  .chart-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:16px;letter-spacing:.3px;}
  /* Bar chart */
  .bc-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bc-key{width:18px;font-size:12px;font-weight:800;flex-shrink:0;}
  .bc-track{flex:1;height:24px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden;}
  .bc-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:rgba(255,255,255,.9);transition:width .8s ease;}
  .bc-pct{width:38px;text-align:right;font-size:12px;font-weight:700;color:rgba(255,255,255,.5);}
  /* Filters */
  .filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .f-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
  .f-btn:hover,.f-btn.fa{border-color:var(--fc,#6c63ff);color:var(--fc,#6c63ff);background:rgba(108,99,255,.08);}
  .f-search{flex:1;min-width:180px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:7px 16px;color:#fff;font-size:13px;font-family:'Inter',sans-serif;outline:none;}
  .f-search:focus{border-color:rgba(108,99,255,.5);}
  .f-search::placeholder{color:rgba(255,255,255,.3);}
  /* Candidate cards */
  .cand-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border .2s;}
  .cand-card:hover{border-color:rgba(255,255,255,.15);}
  .cand-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;flex-wrap:wrap;gap:8px;}
  .cand-left{display:flex;align-items:center;gap:14px;}
  .cand-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;font-family:'Playfair Display',serif;flex-shrink:0;}
  .cand-name{font-size:15px;font-weight:700;color:#fff;}
  .cand-email{font-size:12px;color:rgba(255,255,255,.4);margin-top:1px;}
  .cand-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .profile-pill{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;}
  .cand-date{font-size:11px;color:rgba(255,255,255,.3);}
  .cand-chev{color:rgba(255,255,255,.3);font-size:18px;transition:transform .3s;}
  .cand-chev.open{transform:rotate(180deg);}
  /* Expanded body */
  .cand-body{display:none;padding:0 20px 20px;border-top:1px solid rgba(255,255,255,.06);}
  .cand-body.open{display:block;}
  .cand-grid{display:grid;grid-template-columns:200px 1fr;gap:20px;padding-top:16px;}
  @media(max-width:600px){.cand-grid{grid-template-columns:1fr;}}
  .score-bars{display:flex;flex-direction:column;gap:9px;}
  .sb-row{display:flex;align-items:center;gap:8px;}
  .sb-key{width:16px;font-size:11px;font-weight:800;}
  .sb-track{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
  .sb-fill{height:100%;border-radius:4px;}
  .sb-pct{width:30px;font-size:11px;color:rgba(255,255,255,.4);text-align:right;}
  .cand-desc{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;font-style:italic;border-left:3px solid;padding-left:12px;margin-bottom:14px;}
  .tag-section{margin-bottom:12px;}
  .tag-title{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;}
  .eval-box{border-radius:10px;padding:14px;margin-top:4px;}
  .eval-title{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
  .eval-text{font-size:13px;line-height:1.65;}
  .rec-box{border-radius:10px;padding:14px;margin-top:10px;}
  /* Empty / loading */
  .adm-empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.3);}
  .adm-loading{text-align:center;padding:60px;color:rgba(255,255,255,.4);font-size:15px;}
  /* Summary row */
  .summary-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .sum-chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 14px;font-size:12px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:6px;}
  .sum-chip strong{color:#fff;}

  @media print {
    body > * { display: none !important; }
    #print-report { display: block !important; }
  }
  #print-report { display: none; }
</style>

function score(answers){
  const c={D:0,I:0,S:0,C:0};
  Object.values(answers).forEach(t=>c[t]++);
  const total=Object.values(c).reduce((a,b)=>a+b,0);
  const pct={};
  ["D","I","S","C"].forEach(k=>pct[k]=total?Math.round(c[k]/total*100):0);
  const dominant=Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
  return{counts:c,pct,dominant};
}

function radarSVG(pct){
  const cx=100,cy=100,r=68;
  const labels=["D","I","S","C"];
  const angles=[-90,0,90,180];
  const pts=labels.map((l,i)=>{
    const a=angles[i]*Math.PI/180;
    const v=pct[l]/100*r;
    return{x:cx+v*Math.cos(a),y:cy+v*Math.sin(a)};
  });
  const axes=labels.map((l,i)=>{
    const a=angles[i]*Math.PI/180;
    return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a),l,c:DISC_COLORS[l]};
  });
  let svg=`<svg viewBox="0 0 200 200" style="width:100%;max-width:200px">`;
  [.25,.5,.75,1].forEach(f=>{
    const ps=labels.map((_,i)=>{const a=angles[i]*Math.PI/180;return`${cx+r*f*Math.cos(a)},${cy+r*f*Math.sin(a)}`;}).join(" ");
    svg+=`<polygon points="${ps}" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>`;
  });
  axes.forEach(a=>svg+=`<line x1="${cx}" y1="${cy}" x2="${a.x}" y2="${a.y}" stroke="#ddd" stroke-width="0.5"/>`);
  const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");
  svg+=`<polygon points="${poly}" fill="rgba(41,128,185,.15)" stroke="#2980B9" stroke-width="2"/>`;
  axes.forEach((a,i)=>{svg+=`<circle cx="${pts[i].x}" cy="${pts[i].y}" r="3" fill="${a.c}"/>`;});
  axes.forEach(a=>svg+=`<text x="${a.x}" y="${a.y}" text-anchor="middle" dominant-baseline="middle" style="font-size:13px;font-weight:700;fill:${a.c};font-family:'Playfair Display',serif">${a.l}</text>`);
  svg+=`</svg>`;
  return svg;
}

// ── API SUPABASE ──
async function saveResult(data){
  try{
    await fetch(SUPABASE_URL+"/rest/v1/disc_respostas",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY,
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({
        nome:data.name, email:data.email,
        respostas:data.answers, enviado_em:data.submittedAt
      })
    });
  }catch(e){}
}

async function loadResults(){
  try{
    const r=await fetch(
      SUPABASE_URL+"/rest/v1/disc_respostas?order=enviado_em.desc",
      {headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}}
    );
    const rows=await r.json();
    return (rows||[]).map(r=>({
      name:r.nome, email:r.email,
      answers:r.respostas, submittedAt:r.enviado_em
    }));
  }catch(e){return[];}
}


// ── HANDLERS ──
async function handleSubmit(){
  if(Object.keys(state.answers).length<20)return;
  setState({submitLoading:true});
  const result={
    name:state.name.trim(),
    email:state.email.trim(),
    answers:state.answers,
    submittedAt:new Date().toISOString()
  };
  await saveResult(result);
  setState({result,view:"done",submitLoading:false});
}

async function handleAdminLogin(){
  if(state.adminPass===ADMIN_PASS){
    setState({loading:true,view:"admin",adminError:""});
    const allResults=await loadResults();
    setState({allResults,loading:false});
  } else {
    setState({adminError:"Senha incorreta. Tente novamente."});
  }
}

async function refreshAdmin(){
  setState({loading:true});
  const allResults=await loadResults();
  setState({allResults,loading:false});
}

      ${state.loading?`<div class="adm-loading">⏳ Carregando...</div>`:`
      <!-- KPIs -->
      <div class="kpi-grid">
        ${kpis.map(k=>`<div class="kpi-card" style="--kc:${k.c}">
          <div class="kpi-icon">${k.icon}</div>
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value" style="font-size:${String(k.value).length>6?'18px':'30px'}">${k.value}</div>
          <div class="kpi-sub">${k.sub}</div>
        </div>`).join('')}
      </div>
      <!-- Charts -->
      <div class="charts-row">
        <div class="chart-box">
          <div class="chart-title">Distribuição por Perfil Dominante</div>
          ${barChart}
        </div>
        <div class="chart-box">
          <div class="chart-title">Média de Score por Dimensão</div>
          ${avgChart}
        </div>
      </div>
      <!-- Filters -->
      <div class="filter-row">
        <button class="f-btn ${!state.adminFilter||state.adminFilter==='all'?'fa':''}" style="--fc:#6c63ff" onclick="setAdminFilter('all',this)">Todos (${count})</button>
        ${['D','I','S','C'].map(k=>`<button class="f-btn ${state.adminFilter===k?'fa':''}" style="--fc:${DISC_COLORS[k]}" onclick="setAdminFilter('${k}',this)">${PROFILES[k].icon} ${PROFILES[k].name} (${domCounts[k]})</button>`).join('')}
        <input class="f-search" placeholder="🔍 Buscar por nome ou e-mail..." oninput="setAdminSearch(this.value)" value="${state.adminSearch||''}"/>
      </div>
      <!-- Cards -->
      ${cards}
      `}
    </div>
  </div>`;
}

function toggleCand(i){
  const b=document.getElementById('cb'+i);
  const c=document.getElementById('chev'+i);
  const open=b.classList.toggle('open');
  c.classList.toggle('open',open);
}

function setAdminFilter(f){
  setState({adminFilter:f});
}


function setAdminSearch(q){
  state.adminSearch=q;
  render();
}

function generateReport(r){
  state._printCandidate = r;
  window.print();
}


// ── MAIN RENDER ──
function render(){
  const app=document.getElementById("app");
  if(state.view==="admin"){app.innerHTML=renderAdmin();return;}
  app.innerHTML=`<div class="wrap">${
    state.view==="form"?(state.step==="info"?renderInfo():renderQuestions()):
    state.view==="done"?renderDone():
    renderAdminLogin()
  }</div>`;
}

// ── GLOBAL FUNCTIONS (called from HTML) ──
function startQuestions(){
  const n=document.getElementById("inp-name")?.value||state.name;
  const e=document.getElementById("inp-email")?.value||state.email;
  state.name=n;state.email=e;
  if(!n.trim()){setState({infoError:"Por favor, informe seu nome."});return;}
  if(!e.trim()||!e.includes("@")){setState({infoError:"Por favor, informe um e-mail válido."});return;}
  setState({infoError:"",step:"questions"});
  window.scrollTo(0,0);
}

function selectAnswer(qId,type){
  state.answers={...state.answers,[qId]:type};
  render();
}


// ── PRINT ──
window.addEventListener('beforeprint', function(){
  var r = state._printCandidate;
  if(!r) return;
  var el = document.getElementById('print-report');
  if(!el){ el = document.createElement('div'); el.id='print-report'; document.body.appendChild(el); }
  var s = score(r.answers);
  var dominant = s.dominant;
  var pct = s.pct;
  var counts = s.counts;
  var p = PROFILES[dominant];
  var dc = p.color;
  var dbg = p.bg;
  var kc = {D:'#C0392B',I:'#D35400',S:'#1E8449',C:'#1A5276'};
  var kbg = {D:'#FDF2F0',I:'#FEF9F0',S:'#F0FBF4',C:'#EBF5FB'};
  var date = r.submittedAt ? new Date(r.submittedAt).toLocaleString('pt-BR') : '';
  var rec = {
    D:'Indicada para funções com metas claras e autonomia. Potencial para liderança. Estimular escuta ativa e integração com equipe.',
    I:'Indicada para comunicação e trabalho colaborativo. Estruturar prazos com checklist. Potencial para onboarding.',
    S:'Ideal para consistência e colaboração. Excelente para análise de rotina. Encorajar posicionamento mais ativo.',
    C:'Ideal para análise técnica e controle de qualidade. Definir prazos claros. Estimular decisão com dados parciais.'
  };
  var scoreCards = ['D','I','S','C'].map(function(k){
    return '<div style="border-radius:8px;padding:12px;text-align:center;background:'+kbg[k]+';border:2px solid '+(k===dominant?kc[k]:'transparent')+'">'+
      '<div style="font-size:20px;font-weight:900;color:'+kc[k]+'">'+k+'</div>'+
      '<div style="font-size:10px;color:'+kc[k]+';margin-top:2px">'+PROFILES[k].name+'</div>'+
      '<div style="font-size:24px;font-weight:800;color:'+kc[k]+';margin-top:6px">'+pct[k]+'%</div>'+
      '<div style="font-size:9px;color:#999;margin-top:2px">'+counts[k]+' respostas</div>'+
    '</div>';
  }).join('');
  el.innerHTML =
    '<div style="font-family:Arial,sans-serif;font-size:13px;color:#1a1a2e;background:#fff;padding:0">'+
    // HEADER
    '<div style="background:linear-gradient(135deg,#0f0c29,#0f3460);padding:22px 28px;display:flex;justify-content:space-between;align-items:center">'+
      '<div><div style="font-size:20px;font-weight:800;color:#fff">Avaliação DISC</div>'+
      '<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:3px">Relatório Individual de Perfil Comportamental</div></div>'+
      '<div style="font-size:11px;color:rgba(255,255,255,.5)">'+date+'</div>'+
    '</div>'+
    // INFO STRIP
    '<div style="padding:14px 28px;display:flex;justify-content:space-between;align-items:center;background:'+dbg+';border-bottom:3px solid '+dc+'">'+
      '<div style="display:flex;align-items:center;gap:12px">'+
        '<div style="width:44px;height:44px;border-radius:10px;background:'+dc+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900">'+dominant+'</div>'+
        '<div><div style="font-size:16px;font-weight:800">'+r.name+'</div>'+
        '<div style="font-size:11px;color:#777;margin-top:2px">'+r.email+'</div></div>'+
      '</div>'+
      '<div style="background:'+dc+';color:#fff;border-radius:20px;padding:7px 18px;font-size:13px;font-weight:800">Perfil '+dominant+' · '+p.name+'</div>'+
    '</div>'+
    // SCORES
    '<div style="padding:16px 28px">'+
      '<div style="font-size:10px;font-weight:800;color:#aaa;letter-spacing:2px;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid #eee;margin-bottom:12px">Resultado Geral</div>'+
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'+scoreCards+'</div>'+
      // DESC
      '<div style="background:'+dbg+';border-left:4px solid '+dc+';padding:12px 14px;border-radius:0 6px 6px 0;font-style:italic;font-size:12px;line-height:1.65;color:#333;margin-bottom:12px">'+p.desc+'</div>'+
      // 2 cols
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'+
        '<div style="background:#f0fbf4;border:1px solid #c8e6c9;border-radius:7px;padding:12px">'+
          '<div style="font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#1e6b3a;margin-bottom:8px">✅ Pontos Fortes</div>'+
          p.strengths.map(function(s){return '<div style="font-size:11px;color:#1a3d24;margin-bottom:4px">• '+s+'</div>';}).join('')+
        '</div>'+
        '<div style="background:#fdf2f0;border:1px solid #ffcdd2;border-radius:7px;padding:12px">'+
          '<div style="font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#c62828;margin-bottom:8px">⚠️ Pontos de Atenção</div>'+
          p.challenges.map(function(s){return '<div style="font-size:11px;color:#5a1a14;margin-bottom:4px">• '+s+'</div>';}).join('')+
        '</div>'+
      '</div>'+
      '<div style="background:#eef4ff;border-left:4px solid #4a6cf7;border-radius:0 7px 7px 0;padding:12px 14px;margin-bottom:10px">'+
        '<div style="font-size:9px;font-weight:800;letter-spacing:1px;color:#1a237e;margin-bottom:6px;text-transform:uppercase">🧑‍💼 Orientação ao Candidato</div>'+
        '<div style="font-size:12px;color:#1a237e;line-height:1.65">'+p.analyst+'</div>'+
      '</div>'+
      '<div style="background:#f0fbf4;border-left:4px solid #1e8449;border-radius:0 7px 7px 0;padding:12px 14px;margin-bottom:10px">'+
        '<div style="font-size:9px;font-weight:800;letter-spacing:1px;color:#1a3d24;margin-bottom:6px;text-transform:uppercase">📋 Recomendação ao Recrutador</div>'+
        '<div style="font-size:12px;color:#1a3d24;line-height:1.65">'+rec[dominant]+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="background:#f8f9fc;border-top:1px solid #eee;padding:10px 28px;display:flex;justify-content:space-between;align-items:center">'+
      '<div style="font-size:10px;color:#aaa">Avaliação DISC · '+r.name+' · '+date+'</div>'+
      '<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:3px 9px;font-size:10px;color:#856404;font-weight:700">🔒 Documento Confidencial</div>'+
    '</div>'+
    '</div>';
});

window.addEventListener('afterprint', function(){
  state._printCandidate = null;
  var el = document.getElementById('print-report');
  if(el) el.innerHTML = '';
});

render();
</script>
</body>
</html>
