<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<title>Avaliação DISC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:'Inter',sans-serif;padding:24px 16px;}
  .wrap{max-width:680px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .card{background:#fff;border-radius:20px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden;}
  .header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:28px 32px;text-align:center;}
  .header h1{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px;}
  .header p{font-size:13px;opacity:.7;line-height:1.6;}
  .tag{display:inline-block;background:rgba(255,255,255,.1);border-radius:20px;padding:5px 16px;font-size:11px;letter-spacing:3px;margin-bottom:14px;color:rgba(255,255,255,.7);}
  .body{padding:28px 32px;}
  .disc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
  .disc-chip{text-align:center;padding:12px 6px;border-radius:12px;}
  .disc-chip .letter{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;}
  .disc-chip .lbl{font-size:11px;color:#666;margin-top:3px;}
  label{font-size:14px;font-weight:700;color:#222;display:block;margin-bottom:8px;}
  input[type=text],input[type=email],input[type=password]{width:100%;padding:12px 14px;border-radius:10px;border:2px solid #e0e0e0;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border .2s;margin-bottom:18px;}
  input:focus{border-color:#0f3460;}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;font-family:'Inter',sans-serif;transition:opacity .2s;}
  .btn-primary{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;}
  .btn-green{background:linear-gradient(135deg,#1E8449,#27AE60);color:#fff;}
  .btn-ghost{background:transparent;color:#666;border:2px solid #e0e0e0;margin-top:10px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .error-box{background:#fdf2f0;border:1px solid #f1948a;border-radius:8px;padding:10px 14px;color:#c0392b;font-size:13px;margin-bottom:16px;}
  .note{font-size:11px;color:#aaa;text-align:center;margin-top:12px;}

  /* Progress */
  .prog-bar{height:5px;background:#f0f0f0;}
  .prog-fill{height:100%;background:linear-gradient(90deg,#1a1a2e,#27AE60);border-radius:0 4px 4px 0;transition:width .3s;}
  .prog-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;}
  .prog-header h2{font-family:'Playfair Display',serif;font-size:18px;color:#1a1a2e;}
  .prog-count{font-size:22px;font-weight:800;color:#1a1a2e;text-align:right;}
  .prog-count span{font-size:13px;font-weight:400;color:#999;}

  /* Questions */
  .question{margin-bottom:22px;padding:18px;border-radius:14px;border:2px solid #f0f0f0;background:#fafafa;transition:all .2s;}
  .question.answered{border-color:#c8e6c9;background:#f8fff8;}
  .q-num{font-size:11px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:6px;}
  .q-text{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:14px;line-height:1.5;}
  .opt-btn{width:100%;text-align:left;padding:11px 14px;border-radius:10px;border:2px solid #e8e8e8;background:#fff;font-size:14px;color:#444;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:10px;margin-bottom:7px;transition:all .15s;}
  .opt-btn:hover{border-color:#bbb;background:#f5f5f5;}
  .opt-btn.sel{font-weight:700;}
  .radio{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .radio-dot{width:8px;height:8px;border-radius:50%;background:#fff;}

  /* Result */
  .result-card{border-radius:16px;overflow:hidden;border:2px solid;box-shadow:0 4px 20px rgba(0,0,0,.08);}
  .result-header{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border-bottom:2px solid;}
  .result-badge{border-radius:12px;padding:8px 20px;font-weight:800;font-size:17px;letter-spacing:2px;font-family:'Playfair Display',serif;color:#fff;}
  .result-body{padding:24px;display:flex;flex-wrap:wrap;gap:24px;}
  .radar-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;}
  .legend{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
  .leg-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#555;}
  .leg-dot{width:10px;height:10px;border-radius:2px;}
  .info-cols{flex:1 1 260px;}
  .italic-block{font-size:14px;color:#333;line-height:1.7;margin-bottom:16px;font-style:italic;border-left:3px solid;padding-left:12px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .mini-card{border-radius:10px;padding:12px;border:1px solid;}
  .mini-title{font-weight:700;font-size:13px;margin-bottom:6px;}
  .mini-item{font-size:12px;color:#333;margin-bottom:4px;}
  .analyst-box{border-radius:10px;padding:12px;border:1px solid;}
  .analyst-title{font-weight:700;font-size:13px;margin-bottom:6px;}
  .analyst-text{font-size:13px;color:#333;line-height:1.6;}
  .bars{padding:0 24px 24px;}
  .bar-row{margin-bottom:8px;}
  .bar-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px;}
  .bar-track{height:10px;background:#f0f0f0;border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;transition:width 1s ease;}

  /* Admin */
  .admin-wrap{max-width:900px;width:100%;margin:0 auto;}
  .admin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .admin-title{color:#fff;font-family:'Playfair Display',serif;font-size:24px;}
  .admin-sub{color:rgba(255,255,255,.6);font-size:13px;margin-top:4px;}
  .btn-sm{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:10px 18px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;}
  .empty-state{background:rgba(255,255,255,.1);border-radius:16px;padding:48px;text-align:center;color:rgba(255,255,255,.7);}
  .empty-icon{font-size:48px;margin-bottom:12px;}
  .loading{color:#fff;text-align:center;padding:60px;font-size:18px;}
  .admin-link{margin-top:16px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;}
  .success-note{background:#f8f9fa;border-radius:12px;padding:16px;font-size:13px;color:#666;line-height:1.6;text-align:center;}
</style>

const PROFILES = {
  D:{name:"Dominância",color:"#C0392B",bg:"#FDF2F0",border:"#E74C3C",icon:"⚡",
    desc:"Você é direto, decisivo e orientado a resultados. Assume riscos calculados e prefere agir a esperar. Tem forte senso de urgência e gosta de autonomia para tomar decisões.",

// ── UTILS ──
function score(answers){
  const c={D:0,I:0,S:0,C:0};
  Object.values(answers).forEach(t=>c[t]++);
  const total=Object.values(c).reduce((a,b)=>a+b,0);
  const pct={};
  ["D","I","S","C"].forEach(k=>pct[k]=total?Math.round(c[k]/total*100):0);
  const dominant=Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
  return{counts:c,pct,dominant};
}

function radarSVG(pct){
  const cx=100,cy=100,r=68;
  const labels=["D","I","S","C"];
  const angles=[-90,0,90,180];
  const pts=labels.map((l,i)=>{
    const a=angles[i]*Math.PI/180;
    const v=pct[l]/100*r;
    return{x:cx+v*Math.cos(a),y:cy+v*Math.sin(a)};
  });
  const axes=labels.map((l,i)=>{
    const a=angles[i]*Math.PI/180;
    return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a),l,c:DISC_COLORS[l]};
  });
  let svg=`<svg viewBox="0 0 200 200" style="width:100%;max-width:200px">`;
  [.25,.5,.75,1].forEach(f=>{
    const ps=labels.map((_,i)=>{const a=angles[i]*Math.PI/180;return`${cx+r*f*Math.cos(a)},${cy+r*f*Math.sin(a)}`;}).join(" ");
    svg+=`<polygon points="${ps}" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>`;
  });
  axes.forEach(a=>svg+=`<line x1="${cx}" y1="${cy}" x2="${a.x}" y2="${a.y}" stroke="#ddd" stroke-width="0.5"/>`);
  const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");
  svg+=`<polygon points="${poly}" fill="rgba(41,128,185,.15)" stroke="#2980B9" stroke-width="2"/>`;
  axes.forEach((a,i)=>{svg+=`<circle cx="${pts[i].x}" cy="${pts[i].y}" r="3" fill="${a.c}"/>`;});
  axes.forEach(a=>svg+=`<text x="${a.x}" y="${a.y}" text-anchor="middle" dominant-baseline="middle" style="font-size:13px;font-weight:700;fill:${a.c};font-family:'Playfair Display',serif">${a.l}</text>`);
  svg+=`</svg>`;
  return svg;
}

        <div style="font-size:13px;color:#666;margin-top:2px">${r.email}</div>
        ${dateStr?`<div style="font-size:12px;color:#999;margin-top:2px">${dateStr}</div>`:""}
      </div>
      <div class="result-badge" style="background:${p.color}">Perfil ${dominant} · ${p.name}</div>
    </div>
    <div class="result-body">
      <div class="radar-wrap">
        ${radarSVG(pct)}
        <div class="legend">
          ${["D","I","S","C"].map(k=>`<div class="leg-item"><div class="leg-dot" style="background:${DISC_COLORS[k]}"></div>${k}: <strong>${pct[k]}%</strong></div>`).join("")}
        </div>
      </div>
      <div class="info-cols">
        <div class="italic-block" style="border-color:${p.border}">${p.desc}</div>
        <div class="two-col">
          <div class="mini-card" style="background:#F8FFF8;border-color:#c8e6c9">
            <div class="mini-title" style="color:#2e7d32">✅ Pontos Fortes</div>
            ${p.strengths.map(s=>`<div class="mini-item">• ${s}</div>`).join("")}
          </div>
          <div class="mini-card" style="background:#FFF8F8;border-color:#ffcdd2">
            <div class="mini-title" style="color:#c62828">⚠️ Pontos de Atenção</div>
            ${p.challenges.map(c=>`<div class="mini-item">• ${c}</div>`).join("")}
          </div>
        </div>
        <div class="analyst-box" style="background:#EEF4FF;border-color:#c5d8f7">
          <div class="analyst-title" style="color:#1a237e">🧑‍💼 Avaliação para Analista</div>
          <div class="analyst-text">${p.analyst}</div>
        </div>
      </div>
    </div>
    <div class="bars">
      ${["D","I","S","C"].map(k=>`
        <div class="bar-row">
          <div class="bar-label">
            <span style="font-weight:700;color:${DISC_COLORS[k]}">${k} — ${PROFILES[k].name}</span>
            <span style="color:#666">${counts[k]} respostas · ${pct[k]}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct[k]}%;background:${DISC_COLORS[k]}"></div></div>
        </div>`).join("")}
    </div>
  </div>`;
}

// ── API ──
async function saveResult(data){
  if(!SCRIPT_URL||SCRIPT_URL.includes("COLE")){return;}
  try{
    await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"save",...data})});
  }catch(e){}
}

async function loadResults(){
  if(!SCRIPT_URL||SCRIPT_URL.includes("COLE")){return[];}
  try{
    const res=await fetch(`${SCRIPT_URL}?action=list&token=${ADMIN_TOKEN}`);
    const data=await res.json();
    return data.results||[];
  }catch(e){return[];}
}

// ── HANDLERS ──
async function handleSubmit(){
  if(Object.keys(state.answers).length<20)return;
  setState({submitLoading:true});
  const result={
    name:state.name.trim(),
    email:state.email.trim(),
    answers:state.answers,
    submittedAt:new Date().toISOString()
  };
  await saveResult(result);
  setState({result,view:"done",submitLoading:false});
}

async function handleAdminLogin(){
  if(state.adminPass==="disc2026"){
    setState({loading:true,view:"admin",adminError:""});
    const allResults=await loadResults();
    setState({allResults,loading:false});
  } else {
    setState({adminError:"Senha incorreta. Tente novamente."});
  }
}

async function refreshAdmin(){
  setState({loading:true});
  const allResults=await loadResults();
  setState({allResults,loading:false});
}

// ── RENDER FUNCTIONS ──
function renderInfo(){
  return`<div class="card">
    <div class="header">
      <div class="tag">AVALIAÇÃO COMPORTAMENTAL</div>
      <h1>Perfil DISC</h1>
      <p>20 questões · Aproximadamente 5 minutos<br>Responda com honestidade — não há respostas certas ou erradas.</p>
    </div>
    <div class="body">
      <div class="disc-grid">
        ${[{l:"D",lbl:"Dominância",c:"#C0392B"},{l:"I",lbl:"Influência",c:"#D35400"},{l:"S",lbl:"Estabilidade",c:"#1E8449"},{l:"C",lbl:"Conformidade",c:"#1A5276"}]
          .map(p=>`<div class="disc-chip" style="background:${p.c}12;border:2px solid ${p.c}30">
            <div class="letter" style="color:${p.c}">${p.l}</div>
            <div class="lbl">${p.lbl}</div>
          </div>`).join("")}
      </div>
      <label>Nome completo *</label>
      <input type="text" id="inp-name" placeholder="Digite seu nome completo" value="${state.name}" oninput="state.name=this.value"/>
      <label>E-mail *</label>
      <input type="email" id="inp-email" placeholder="Digite seu e-mail" value="${state.email}" oninput="state.email=this.value" onkeydown="if(event.key==='Enter')startQuestions()"/>
      ${state.infoError?`<div class="error-box">⚠️ ${state.infoError}</div>`:""}
      <button class="btn btn-primary" onclick="startQuestions()">Iniciar Avaliação →</button>
      <p class="note">Suas informações são confidenciais e usadas apenas para identificar seu resultado.</p>
    </div>
  </div>
  <button class="admin-link" onclick="setState({view:'adminLogin',adminError:''})">Acesso Admin</button>`;
}

function renderQuestions(){
  const answered=Object.keys(state.answers).length;
  const prog=Math.round(answered/20*100);
  const allDone=answered===20;
  return`<div class="card">
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff">
      <div class="prog-header">
        <div>
          <h2>Avaliação DISC</h2>
          <div style="font-size:12px;opacity:.6;margin-top:2px">${state.name}</div>
        </div>
        <div class="prog-count">${answered}<span>/20 respondidas</span></div>
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
    <div class="body">
      ${DISC_QUESTIONS.map(q=>{
        const ans=state.answers[q.id];
        return`<div class="question${ans?" answered":""}">
          <div class="q-num">QUESTÃO ${String(q.id).padStart(2,"0")}</div>
          <div class="q-text">${q.text}</div>
          ${q.options.map(o=>{
            const sel=ans===o.type;
            const p=PROFILES[o.type];
            return`<button class="opt-btn${sel?" sel":""}"
              style="${sel?`border-color:${p.color};background:${p.bg};color:${p.color}`:""}"
              onclick="selectAnswer(${q.id},'${o.type}')">
              <div class="radio" style="${sel?`border-color:${p.color};background:${p.color}`:""}">
                ${sel?`<div class="radio-dot"></div>`:""}
              </div>
              ${o.text}
            </button>`;
          }).join("")}
        </div>`;
      }).join("")}
      ${!allDone?`<div style="text-align:center;font-size:13px;color:#999;margin-bottom:14px">Responda todas as ${20-answered} questão(ões) restante(s) para concluir.</div>`:""}
      <button class="btn ${allDone?"btn-green":"btn-primary"}" ${!allDone||state.submitLoading?"disabled":""} onclick="handleSubmit()">
        ${state.submitLoading?"⏳ Salvando...":allDone?"✅ Ver Meu Resultado":"⏳ "+answered+"/20 respondidas"}
      </button>
    </div>
  </div>`;
}

function renderDone(){
  return`<div class="card" style="max-width:700px">
    <div class="header">
      <div style="font-size:36px;margin-bottom:8px">${PROFILES[score(state.result.answers).dominant].icon}</div>
      <h1>Seu Perfil DISC está pronto!</h1>
      <p>Obrigado, ${state.result.name}! Veja sua avaliação abaixo.</p>
    </div>
    <div class="body">
      ${resultCardHTML(state.result)}
      <div class="success-note" style="margin-top:16px">
        ✅ Suas respostas foram registradas com sucesso.<br>O responsável pela avaliação já pode visualizar seu resultado.
      </div>
    </div>
  </div>
  <button class="admin-link" onclick="setState({view:'adminLogin',adminError:''})">Acesso Admin</button>`;
}

function renderAdminLogin(){
  return`<div class="card" style="max-width:420px">
    <div class="header">
      <div style="font-size:36px;margin-bottom:8px">🔐</div>
      <h1>Painel Admin</h1>
      <p>Avaliação DISC — Resultados das candidatas</p>
    </div>
    <div class="body">
      <label>Senha de acesso</label>
      <input type="password" placeholder="Digite a senha" value="${state.adminPass}"
        oninput="state.adminPass=this.value"
        onkeydown="if(event.key==='Enter')handleAdminLogin()"/>
      ${state.adminError?`<div class="error-box">${state.adminError}</div>`:""}
      <button class="btn btn-primary" onclick="handleAdminLogin()">Acessar Resultados</button>
      <button class="btn btn-ghost" onclick="setState({view:'form',step:'info'})">← Voltar ao Formulário</button>
    </div>
  </div>`;
}

function renderAdmin(){
  const count=state.allResults.length;
  return`<div class="admin-wrap">
    <div class="admin-top">
      <div>
        <div class="admin-title">📊 Painel de Resultados DISC</div>
        <div class="admin-sub">${count} resposta(s) recebida(s)</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn-sm" onclick="refreshAdmin()">🔄 Atualizar</button>
        <button class="btn-sm" onclick="setState({view:'form',step:'info'})">← Sair</button>
      </div>
    </div>
    ${state.loading?`<div class="loading">⏳ Carregando resultados...</div>`:
      count===0?`<div class="empty-state"><div class="empty-icon">📭</div><div style="font-size:18px;font-weight:600">Nenhuma resposta ainda</div><div style="font-size:14px;margin-top:6px">Compartilhe o link do formulário para receber avaliações.</div></div>`:
      state.allResults.map(r=>resultCardHTML(r,true)).join("")}
  </div>`;
}

// ── MAIN RENDER ──
function render(){
  const app=document.getElementById("app");
  const isAdmin=state.view==="admin"||state.view==="adminLogin";
  app.innerHTML=`<div class="wrap" style="${isAdmin?"max-width:100%;padding:0 16px":""}">${
    state.view==="form"?(state.step==="info"?renderInfo():renderQuestions()):
    state.view==="done"?renderDone():
    state.view==="adminLogin"?renderAdminLogin():
    renderAdmin()
  }</div>`;
}

// ── GLOBAL FUNCTIONS (called from HTML) ──
function startQuestions(){
  const n=document.getElementById("inp-name")?.value||state.name;
  const e=document.getElementById("inp-email")?.value||state.email;
  state.name=n;state.email=e;
  if(!n.trim()){setState({infoError:"Por favor, informe seu nome."});return;}
  if(!e.trim()||!e.includes("@")){setState({infoError:"Por favor, informe um e-mail válido."});return;}
  setState({infoError:"",step:"questions"});
  window.scrollTo(0,0);
}

function selectAnswer(qId,type){
  state.answers={...state.answers,[qId]:type};
  render();
}

render();
</script>
</body>
</html>
